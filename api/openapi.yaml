openapi: 3.0.3
info:
  title: NEX OSS/BSS ISP Cloud Platform API
  version: 3.4.0
  description: >
    Final pre-coding OpenAPI contract for NEX OSS/BSS v3.4 Router-Centric.
    Network topology rule: Customer -> Service -> Router -> Router Interface -> Radius NAS -> FreeRadius.
servers:
  - url: https://api.nexbil.local/api/v1
    description: Local/staging API base URL
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Tenants
  - name: Customers
  - name: Products
  - name: Services
  - name: Routers
  - name: Router Interfaces
  - name: Router Links
  - name: Radius
  - name: Billing
  - name: Payments
  - name: Tickets
  - name: Work Orders
  - name: Audit Logs
paths:
  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login and issue access token
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Auth token issued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthToken'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/refresh:
    post:
      tags: [Auth]
      security: []
      summary: Refresh access token
      operationId: authRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthToken'
  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current session
      operationId: authLogout
      responses:
        '204':
          description: Logged out
  /tenants:
    get:
      tags: [Tenants]
      summary: List tenants
      operationId: listTenants
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Tenant list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantCollection'
    post:
      tags: [Tenants]
      summary: Create tenant
      operationId: createTenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantCreateRequest'
      responses:
        '201':
          description: Tenant created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Tenant'
  /tenants/{tenant_id}:
    get:
      tags: [Tenants]
      summary: Get tenant detail
      operationId: getTenant
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Tenant detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Tenant'
    patch:
      tags: [Tenants]
      summary: Update tenant
      operationId: updateTenant
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantUpdateRequest'
      responses:
        '200':
          description: Tenant updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Tenant'
  /tenants/{tenant_id}/customers:
    get:
      tags: [Customers]
      summary: List customers
      operationId: listCustomers
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Customer list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerCollection'
    post:
      tags: [Customers]
      summary: Create customer
      operationId: createCustomer
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerCreateRequest'
      responses:
        '201':
          description: Customer created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Customer'
  /tenants/{tenant_id}/customers/{customer_id}:
    get:
      tags: [Customers]
      summary: Get customer detail
      operationId: getCustomer
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/CustomerId'
      responses:
        '200':
          description: Customer detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Customer'
    patch:
      tags: [Customers]
      summary: Update customer
      operationId: updateCustomer
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/CustomerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerUpdateRequest'
      responses:
        '200':
          description: Customer updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Customer'
    delete:
      tags: [Customers]
      summary: Deactivate customer
      operationId: deleteCustomer
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/CustomerId'
      responses:
        '204':
          description: Customer deactivated
  /tenants/{tenant_id}/products:
    get:
      tags: [Products]
      summary: List products
      operationId: listProducts
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductCollection'
    post:
      tags: [Products]
      summary: Create product
      operationId: createProduct
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Product'
  /tenants/{tenant_id}/service-categories:
    get:
      tags: [Products]
      summary: List service categories
      operationId: listServiceCategories
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Service category list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ServiceCategory'
  /tenants/{tenant_id}/services:
    get:
      tags: [Services]
      summary: List services
      operationId: listServices
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: customer_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ServiceStatus'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Service list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceCollection'
    post:
      tags: [Services]
      summary: Create service
      operationId: createService
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceCreateRequest'
      responses:
        '201':
          description: Service created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Service'
  /tenants/{tenant_id}/services/{service_id}:
    get:
      tags: [Services]
      summary: Get service detail
      operationId: getService
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ServiceId'
      responses:
        '200':
          description: Service detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Service'
    patch:
      tags: [Services]
      summary: Update service data
      operationId: updateService
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ServiceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceUpdateRequest'
      responses:
        '200':
          description: Service updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Service'
  /tenants/{tenant_id}/services/{service_id}/activate:
    post:
      tags: [Services]
      summary: Activate service
      operationId: activateService
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ServiceId'
      responses:
        '200':
          description: Service activated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Service'
        '409':
          description: Router mapping or Radius requirement incomplete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /tenants/{tenant_id}/services/{service_id}/suspend:
    post:
      tags: [Services]
      summary: Suspend service and Radius user
      operationId: suspendService
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ServiceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                invoice_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Service suspended
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Service'
  /tenants/{tenant_id}/services/{service_id}/unsuspend:
    post:
      tags: [Services]
      summary: Unsuspend service and Radius user
      operationId: unsuspendService
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ServiceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                payment_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Service unsuspended
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Service'
  /tenants/{tenant_id}/services/{service_id}/router-mapping:
    post:
      tags: [Services]
      summary: Map service to router and interface
      operationId: mapServiceRouter
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ServiceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRouterMappingRequest'
      responses:
        '201':
          description: Service mapped to router
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ServiceRouterMapping'
  /tenants/{tenant_id}/routers:
    get:
      tags: [Routers]
      summary: List routers
      operationId: listRouters
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: role
          in: query
          schema:
            $ref: '#/components/schemas/RouterRole'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/RouterStatusValue'
        - name: snmp_status
          in: query
          schema:
            $ref: '#/components/schemas/SnmpStatusValue'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Router list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouterCollection'
    post:
      tags: [Routers]
      summary: Create router
      operationId: createRouter
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouterCreateRequest'
      responses:
        '201':
          description: Router created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Router'
  /tenants/{tenant_id}/routers/{router_id}:
    get:
      tags: [Routers]
      summary: Get router detail
      operationId: getRouter
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/RouterId'
      responses:
        '200':
          description: Router detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Router'
    put:
      tags: [Routers]
      summary: Replace/update router
      operationId: updateRouter
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/RouterId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouterUpdateRequest'
      responses:
        '200':
          description: Router updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Router'
  /tenants/{tenant_id}/routers/{router_id}/impact:
    get:
      tags: [Routers]
      summary: Calculate router impact
      operationId: getRouterImpact
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/RouterId'
      responses:
        '200':
          description: Router impact
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RouterImpact'
  /tenants/{tenant_id}/routers/{router_id}/capacity:
    get:
      tags: [Routers]
      summary: Get router capacity
      operationId: getRouterCapacity
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/RouterId'
      responses:
        '200':
          description: Router capacity
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RouterCapacity'
  /tenants/{tenant_id}/routers/{router_id}/snmp:
    get:
      tags: [Routers]
      summary: Get router SNMP status
      operationId: getRouterSnmp
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/RouterId'
      responses:
        '200':
          description: SNMP status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SnmpStatus'
  /tenants/{tenant_id}/router-interfaces:
    get:
      tags: [Router Interfaces]
      summary: List router interfaces
      operationId: listRouterInterfaces
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: router_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/RouterInterfaceStatus'
      responses:
        '200':
          description: Router interface list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/RouterInterface'
    post:
      tags: [Router Interfaces]
      summary: Create router interface
      operationId: createRouterInterface
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouterInterfaceCreateRequest'
      responses:
        '201':
          description: Router interface created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RouterInterface'
  /tenants/{tenant_id}/router-links:
    get:
      tags: [Router Links]
      summary: List router links
      operationId: listRouterLinks
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: router_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Router link list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/RouterLink'
    post:
      tags: [Router Links]
      summary: Create router link
      operationId: createRouterLink
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouterLinkCreateRequest'
      responses:
        '201':
          description: Router link created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RouterLink'
  /tenants/{tenant_id}/radius/profiles:
    get:
      tags: [Radius]
      summary: List Radius profiles
      operationId: listRadiusProfiles
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Radius profile list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/RadiusProfile'
    post:
      tags: [Radius]
      summary: Create Radius profile
      operationId: createRadiusProfile
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RadiusProfileCreateRequest'
      responses:
        '201':
          description: Radius profile created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RadiusProfile'
  /tenants/{tenant_id}/radius/users:
    get:
      tags: [Radius]
      summary: List Radius users
      operationId: listRadiusUsers
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: service_id
          in: query
          schema:
            type: string
            format: uuid
        - name: router_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Radius user list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/RadiusUser'
    post:
      tags: [Radius]
      summary: Create Radius user
      operationId: createRadiusUser
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RadiusUserCreateRequest'
      responses:
        '201':
          description: Radius user created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RadiusUser'
  /tenants/{tenant_id}/nas:
    get:
      tags: [Radius]
      summary: List Radius NAS devices
      operationId: listNasDevices
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: NAS device list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/NasDevice'
    post:
      tags: [Radius]
      summary: Create Radius NAS device
      operationId: createNasDevice
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NasDeviceCreateRequest'
      responses:
        '201':
          description: NAS device created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/NasDevice'
  /tenants/{tenant_id}/router-script-generator:
    post:
      tags: [Routers]
      summary: Generate MikroTik RouterOS Radius script
      operationId: generateRouterScript
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouterScriptGenerateRequest'
      responses:
        '200':
          description: Script generated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/GeneratedScript'
  /tenants/{tenant_id}/invoices:
    get:
      tags: [Billing]
      summary: List invoices
      operationId: listInvoices
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: customer_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
