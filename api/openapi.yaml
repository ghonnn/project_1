components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantId:
      name: tenant_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CustomerId:
      name: customer_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ServiceId:
      name: service_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RouterId:
      name: router_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Search:
      name: q
      in: query
      schema:
        type: string
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    SuccessEnvelope:
      type: object
      required: [success, data, meta]
      properties:
        success:
          type: boolean
          example: true
        data:
          nullable: true
        meta:
          type: object
          properties:
            request_id:
              type: string
            timestamp:
              type: string
              format: date-time
    ErrorEnvelope:
      type: object
      required: [success, error, meta]
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: validation_failed
            message:
              type: string
            details:
              type: object
              additionalProperties: true
        meta:
          type: object
          properties:
            request_id:
              type: string
            timestamp:
              type: string
              format: date-time
    PaginationMeta:
      type: object
      required: [page, limit, total, total_pages]
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    AuthToken:
      type: object
      required: [access_token, token_type, expires_in, refresh_token]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          example: 3600
        refresh_token:
          type: string
    Tenant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        org_number:
          type: string
          nullable: true
        plan:
          type: string
        status:
          type: string
          enum: [active, suspended, trial, terminated]
        created_at:
          type: string
          format: date-time
    TenantCreateRequest:
      type: object
      required: [name, plan]
      properties:
        name:
          type: string
        org_number:
          type: string
        plan:
          type: string
    TenantUpdateRequest:
      type: object
      properties:
        name:
          type: string
        org_number:
          type: string
        plan:
          type: string
        status:
          type: string
    TenantCollection:
      type: object
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Tenant'
            pagination:
              $ref: '#/components/schemas/PaginationMeta'
    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        external_ref:
          type: string
          nullable: true
        type:
          type: string
          enum: [individual, business]
        name:
          type: string
        billing_contact:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [prospect, lead, qualified, contracted, active, suspended, terminated]
    CustomerCreateRequest:
      type: object
      required: [type, name]
      properties:
        external_ref:
          type: string
        type:
          type: string
          enum: [individual, business]
        name:
          type: string
        billing_contact:
          type: object
    CustomerUpdateRequest:
      type: object
      properties:
        external_ref:
          type: string
        type:
          type: string
        name:
          type: string
        billing_contact:
          type: object
        status:
          type: string
    CustomerCollection:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Customer'
            pagination:
              $ref: '#/components/schemas/PaginationMeta'
    ServiceCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        requires_router_mapping:
          type: boolean
        requires_radius:
          type: boolean
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        service_category_id:
          type: string
          format: uuid
        sku:
          type: string
        name:
          type: string
        pricing:
          type: object
    ProductCreateRequest:
      type: object
      required: [service_category_id, sku, name, pricing]
      properties:
        service_category_id:
          type: string
          format: uuid
        sku:
          type: string
        name:
          type: string
        pricing:
          type: object
    ProductCollection:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Product'
            pagination:
              $ref: '#/components/schemas/PaginationMeta'
    ServiceStatus:
      type: string
      enum: [requested, provisioning, active, suspended, terminated, failed]
    Service:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        service_category_id:
          type: string
          format: uuid
        contract_id:
          type: string
          format: uuid
          nullable: true
        cid:
          type: string
        status:
          $ref: '#/components/schemas/ServiceStatus'
        metadata:
          type: object
    ServiceCreateRequest:
      type: object
      required: [customer_id, product_id, service_category_id]
      properties:
        customer_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        service_category_id:
          type: string
          format: uuid
        contract_id:
          type: string
          format: uuid
        cid:
          type: string
        metadata:
          type: object
    ServiceUpdateRequest:
      type: object
      properties:
        cid:
          type: string
        metadata:
          type: object
    ServiceCollection:
