services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: nex_api
    working_dir: /var/www/html/apps/api-laravel
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: nex_oss_bss
      DB_USERNAME: nex
      DB_PASSWORD: nexpassword
      REDIS_HOST: redis
      FREERADIUS_HOST: 10.20.1.19
      FREERADIUS_AUTH_PORT: 1812
      FREERADIUS_ACCT_PORT: 1813
      FREERADIUS_TEST_SECRET: testing123
      FREERADIUS_SYNC_MODE: database
      MIKROTIK_TEST_PUBLIC_IP: 103.142.202.226
    depends_on:
      - postgres
      - redis
    command: php artisan serve --host=0.0.0.0 --port=8000

  postgres:
    image: postgres:16-alpine
    container_name: nex_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nex_oss_bss
      POSTGRES_USER: nex
      POSTGRES_PASSWORD: nexpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nex_redis
    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nex_pgadmin
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nexbil.id
      PGADMIN_DEFAULT_PASSWORD: password
    depends_on:
      - postgres

volumes:
  postgres_data:
